<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="End Poem - Minecraft">
    <meta property="og:description" content="Beautiful and inspirational Minecraft End Poem written by Julian Gough presented in an immersive wrapper">
    <meta property="og:image" content="https://end.nimd.me/assets/end-poem-nimd-julian-gough.png">
    <meta property="og:url" content="https://end.nimd.me">
    <meta name="keywords" content="End Poem, Minecraft End Poem, Minecraft, Poem, End. nimd, Minecraft poem, Julian Gough">
    <meta name="author" content="NiMD">
    <title>End Poem</title>
    <meta name="description" content="Experience the beautiful and inspirational Minecraft End Poem by Julian Gough in a stunning, immersive format. Presented with smooth animations and a calming atmosphere, this unique rendition enhances the emotional impact of the poem.">
    <link rel="stylesheet" href="./assets/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="controls-container">
        <div class="control-group">
            <div class="control-icon" id="muteButton" title="Mute/Unmute">🔊</div>
            <input type="range" class="control-slider" id="volumeSlider" min="0" max="1" step="0.1" value="0.2">
        </div>
        <div class="control-group">
            <div class="control-icon" title="Reading Speed">⏱️</div>
            <input type="range" class="control-slider" id="speedSlider" min="0.5" max="3" step="0.1" value="1.5">
        </div>
    </div>
    
    <div class="container">
        <div id="namePrompt">
            <div class="mystical-decor">✧</div>
            <div class="welcome-message">
                <h1 class="title">The End</h1>
                <p class="author-credit">A poem by <span>Julian Gough</span></p>
                <div class="separator"></div>
                <p class="subtitle">Experience the journey through isolated corners of your mind.</p>
            </div>
            <input type="text" class="name-input" id="playerName" placeholder="Who are you?" autocomplete="off">
            <button class="start-button" id="startButton">Awaken</button>
        </div>
        
        <div id="poemContainer" class="poem-container"></div>
    </div>
    
    <button id="resumeScrollBtn" class="resume-btn">Resume Journey ↓</button>
    
    <audio id="backgroundMusic" loop>
        <source src="./assets/back.mp3" type="audio/mpeg">
    </audio>
    
    <script src="./assets/script.js"></script>
</body>
</html>
